<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>invitatie nunta</title>
<style>
/* ── CHANGE BACKGROUND COLOR HERE ───────────────────────── */
:root { --bg: #1a0a0a; }
/* ─────────────────────────────────────────────────────────── */

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1a0a0a;
}

header {
  width: 100%;
  flex-shrink: 0;
  padding: 10px 20px;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 30;
}

h1 {
  font-size: 0.95rem;
  font-weight: 600;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #e2e8f0;
}

.page-info {
  font-size: 0.78rem;
  color: #94a3b8;
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

.btn {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: #cbd5e1;
  border-radius: 6px;
  padding: 5px 14px;
  cursor: pointer;
  font-size: 0.82rem;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
  user-select: none;
}
.btn:hover  { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(255,255,255,0.22); }
.btn:active { background: rgba(255,255,255,0.22); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn.icon { padding: 5px 10px; font-size: 1rem; }

#wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 12px 16px;
}

#book { margin: auto; }

#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.4s;
}
#loader span {
  color: rgba(255,255,255,0.4);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
}

footer {
  flex-shrink: 0;
  padding: 7px;
  font-size: 0.68rem;
  color: #3f3030;
  text-align: center;
  letter-spacing: 0.02em;
}

.stf__parent,
.stf__wrapper,
.stf__block,
#book { background: transparent !important; }

#book canvas { background-color: var(--bg) !important; }
</style>
</head>
<body>

<div id="loader"><span>Loading&hellip;</span></div>

<header>
  <h1>invitatie nunta</h1>
  <span class="page-info" id="pinfo"></span>
  <button class="btn" id="bprev" onclick="go(-1)">&#8592; Prev</button>
  <button class="btn" id="bnext" onclick="go(1)">Next &#8594;</button>
  <button class="btn icon" onclick="toggleFull()" title="Toggle fullscreen">&#x26F6;</button>
</header>

<div id="wrap">
  <div id="book"></div>
</div>

<footer>Arrow keys &larr; &rarr; or buttons to navigate &bull; Click page edges to flip</footer>

<script src="page-flip.browser.js"></script>
<script>
(function () {
  const imgs  = ["pages/p0001.jpg", "pages/p0002.jpg", "pages/p0003.jpg"];
  const W = 873, H = 1094;
  const loader = document.getElementById('loader');
  const wrap   = document.getElementById('wrap');
  const book   = document.getElementById('book');

  function makeDarkPage(w, h) {
    const bg = getComputedStyle(document.documentElement)
                 .getPropertyValue('--bg').trim() || '#1a0a0a';
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    return c.toDataURL('image/png');
  }

  function fitBook() {
    const availW = wrap.clientWidth  - 32;
    const availH = wrap.clientHeight - 24;
    const spreadAspect = (W * 2) / H;
    let bw, bh;
    if (availW / availH >= spreadAspect) {
      bh = Math.min(H, availH);
      bw = Math.floor(bh * spreadAspect);
    } else {
      bw = Math.min(W * 2, availW);
      bh = Math.floor(bw / spreadAspect);
    }
    book.style.width  = bw + 'px';
    book.style.height = bh + 'px';
  }

  function preload(urls) {
    return Promise.all(urls.map(src => new Promise(res => {
      const img = new Image();
      img.onload = img.onerror = res;
      img.src = src;
    })));
  }

  // Generate dark blank first, then preload everything including it
  const darkBlank = makeDarkPage(W, H);
  const allImgs   = [darkBlank, ...imgs]; // [blank, cover, p1, p2]

  preload(allImgs).then(() => {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 400);

    fitBook();

    const pf = new St.PageFlip(book, {
      width:  W,
      height: H,
      size: 'stretch',
      minWidth:  160,
      minHeight: 220,
      maxWidth:  W * 2,
      maxHeight: H * 2,
      maxShadowOpacity: 0.4,
      showCover: false,   // blank page 0 acts as the invisible left cover side
      usePortrait: false,
      drawShadow: true,
      flippingTime: 900,
      mobileScrollSupport: false,
      startZIndex: 1,
    });

    pf.loadFromImages(allImgs);
    pf.on('flip', e => updateUI(e.data));
    pf.on('changeOrientation', () => updateUI(pf.getCurrentPageIndex()));

    const labels = { 0: 'Cover', 2: '2 / 3', 4: '3 / 3' };
    function updateUI(idx) {
      document.getElementById('pinfo').textContent = labels[idx] || '';
      document.getElementById('bprev').disabled = idx <= 0;
      document.getElementById('bnext').disabled = idx >= allImgs.length - 2;
    }

    function go(dir) { dir > 0 ? pf.flipNext() : pf.flipPrev(); }
    window.go = go;

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  go(-1);
      if (e.key === 'f' || e.key === 'F') toggleFull();
    });

    window.toggleFull = function () {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    };

    window.addEventListener('resize', () => { fitBook(); pf.update(); });

    updateUI(0);
  });
})();
</script>
</body>
</html>
